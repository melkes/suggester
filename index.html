<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.css">
    <title>Programming Language Suggester</title>
  </head>
  <body>
    <div class="col-md-8 py-5 px-3 mx-auto">
    <h1>Find your language</h1>
    <div class="col-lg-8 px-0">
      <p class="lead">Fill out the form and find the best programming language for you!</p>
      <hr class="mb-5">
      <!-- horizontal line -->
    </div>
    <div class="col-lg-8 px-0">
    <h3>Do you have a specific use in mind?</h3>
    <form id="q1">
      <input type="radio" name="use" value="yes" id="yeah">
      <label for="yeah">Yeah</label><br>
      <input type="radio" name="use" value="no" id="naw">
      <label for="naw">No, I just want something versatile, or maybe for game development</label><br>
      <button type="submit">Submit Selection</button>
    </form>
    <!-- <a href="#" class="text-primary">Example link</a> -->
    <hr class="pb-3 mb-5 ">
    <!-- horizontal line -->
  </body>
</html>
